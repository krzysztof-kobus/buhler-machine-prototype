name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -- --base-href /buhler-machine-prototype/

      # Copy index.html → 404.html so GitHub Pages serves the Angular app
      # for all deep-linked routes instead of returning a real 404.
      - run: cp dist/buhler-machine-prototype/browser/index.html dist/buhler-machine-prototype/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/buhler-machine-prototype/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
